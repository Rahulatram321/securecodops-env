name: securecodops-env
version: "1.2.0"
description: "AI DevSecOps Debugging & Security Audit Environment (OpenEnv)"
author: "Antigravity"

observation_space:
  type: object
  properties:
    task_id: 
      type: string
      description: "The unique identifier of the current task."
    current_phase: 
      type: string
      description: "The current reasoning phase (INIT, CONTEXT_FETCH, ROOT_CAUSE, FINAL)."
    revealed_files: 
      type: object
      description: "Dictionary containing snippets or full contents of files requested by the agent."
    logs: 
      type: string
      description: "Runtime error logs or system output relevant to the bug."
    stack_trace: 
      type: string
      description: "Python stack trace or crash report."
    available_files:
      type: array
      items: {type: string}
      description: "List of files available in the workspace for inspection."

action_space:
  type: object
  properties:
    action_type: 
      type: string
      enum: [IDENTIFY_ISSUE, REQUEST_FILE, NARROW_DOWN, PROPOSE_FIX, ASK_QUESTION, FORM_HYPOTHESIS]
      description: "The type of action to perform in the environment."
    file_name: 
      type: string
      description: "Name of the file to inspect (required for REQUEST_FILE)."
    line_numbers: 
      type: array
      items: {type: integer}
      description: "List of line numbers where the issue is located (required for IDENTIFY_ISSUE)."
    issue_type: 
      type: string
      description: "Type of the vulnerability or bug (e.g., SECURITY, RACE_CONDITION)."
    suggested_fix: 
      type: string
      description: "The proposed code fix (required for PROPOSE_FIX)."
    explanation: 
      type: string
      description: "Natural language explanation of the reasoning."

reward:
  type: float
  range: [0.0, 1.0]
  description: "A normalized score representing the quality of the agent's actions and final solution."
  components:
    - name: line_detection
      weight: 0.3
      description: "Accuracy of identifying the specific lines containing the bug."
    - name: fix_quality
      weight: 0.5
      description: "Semantic and deterministic similarity of the proposed fix to the ground truth."
    - name: efficiency
      weight: 0.2
      description: "Reward for reaching the solution in an optimal number of steps."

tasks:
  - id: spot_the_bug
    difficulty: easy
    max_steps: 5
  - id: security_audit
    difficulty: medium
    max_steps: 7
  - id: system_debug
    difficulty: hard
    max_steps: 10

endpoints:
  reset: /reset
  step: /step
  state: /state
  tasks: /tasks
  grader: /grader
  baseline: /baseline
